name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 네이티브 의존성 설치
        run: pnpm --dir apps/mobile install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - name: 서비스워커 구문 검사
        run: node --check public/sw.js
      - run: pnpm build
      - name: Android·iOS 네이티브 검증
        run: pnpm --dir apps/mobile run check
      - run: pnpm audit:prod
