name: Daily Self-Improve
on:
  schedule:
    - cron: "0 9,21 * * *"   # UTC 09:00/21:00 = KST 18:00/06:00, 하루 2회
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
  issues: write
concurrency:
  group: daily-self-improve
  cancel-in-progress: false
jobs:
  self-improve:
    runs-on: ubuntu-latest
    steps:
      - name: ANTHROPIC_API_KEY 등록 확인 (없으면 즉시 실패)
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::ANTHROPIC_API_KEY secret이 이 저장소에 없습니다. Settings > Secrets and variables > Actions 에서 등록해 주세요. (사람 작업)"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 25"
          prompt: |
            너는 러닝콜(runningcall)의 자가개선 담당 AI 직원이다. 이번 실행에서 딱 1개의 작은 개선만 골라 구현한다.

            ## 개선 후보 (이 중 딱 1개)
            - 작은 버그 수정 (재현 가능한 것만)
            - 테스트 보강 (커버되지 않은 오류 경로·엣지 케이스)
            - 문서 정확화 (README·docs가 실제 동작과 다른 부분)
            - 접근성/UX 소폭 개선 (aria 라벨, 문구 명확화 등)

            ## 어길 수 없는 규칙
            1. main에 직접 push 금지. 반드시 새 브랜치 `claude/self-improve-<날짜-시간>` (예: claude/self-improve-20260710-1800)에서 작업한다.
            2. draft PR을 딱 1개만 생성한다. merge는 사람(회장님)이 한다.
            3. 커밋 전에 `pnpm typecheck && pnpm test && pnpm build`가 전부 통과해야 한다. 실패 상태로 PR을 만들지 않는다.
            4. 유료 외부 API 호출 추가 금지.
            5. 배포 설정(vercel·워크플로)·시크릿·환경변수 변경 금지.
            6. 대량 삭제·lockfile 대규모 변경 금지. 러닝 점수 골든마스터(lib/__tests__/scoring.test.ts)를 깨뜨리지 않는다.
            7. package.json 버전을 PATCH로 올리고(예: 0.13.4 → 0.13.5) CHANGELOG.md에 항목을 추가한다.

            ## PR 설명 (한국어, 비전공자인 회장님 기준)
            - 무엇을 바꿨는지
            - 왜 바꿨는지
            - 사용자에게 무엇이 좋아지는지
            - 위험은 없는지 (테스트·빌드 통과 여부 포함)

            의심스러우면 구현하지 말고 PR 설명에 "사람 확인 필요" 항목으로 남겨라. 열심히 잘못 달리는 것이 가장 위험하다.
